<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fee Balance | Christ’s School Ado Ekiti</title>
     <link rel="icon" type="image/x-icon" href="fav_icon2.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: url('img/school-bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
        }
        .debtor-card {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .icon {
            font-size: 80px;
            color: #d9534f;
            margin-bottom: 20px;
        }
        h2 {
            color: #0a2f44;
            margin-bottom: 15px;
        }
        .message {
            color: #555;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .contact {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
            font-weight: 500;
        }
        .btn {
            background: #0a2f44;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #ffb347;
            color: #0a2f44;
        }
        footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
<div class="debtor-card">
    <div class="icon">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h2>Fee Balance Outstanding</h2>
    <div class="message">
        Your account has an outstanding fee balance. You cannot access the full portal until your fees are cleared.
    </div>
    <div class="contact">
        <i class="fas fa-phone-alt"></i> Contact the Bursary Department:<br>
        <strong>+234 803 123 4567</strong> or visit the school office.
    </div>
    <button class="btn" onclick="logout()">Go Back to Login</button>
    <footer>Christ’s School Ado Ekiti – Christus Victor</footer>
</div>

<script>
    // Check if user is logged in but unpaid – if not, redirect to login
    const userData = JSON.parse(localStorage.getItem('loggedInUser'));
    if (!userData) {
        window.location.href = 'login.html';
    }
    // If by some chance paid user lands here, redirect to dashboard
    if (userData && userData.paid === true) {
        window.location.href = 'dashboard.html';
    }

    function logout() {
        localStorage.removeItem('loggedInUser');
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
