<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | Christ’s School Ado Ekiti</title>
     <link rel="icon" type="image/x-icon" href="fav_icon2.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: url('img/school-bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        /* Dark overlay for readability */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        .login-card {
            background: white;
            max-width: 450px;
            width: 100%;
            border-radius: 32px;
            padding: 2rem 1.8rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
        }
        .logo img {
            width: 100%;
            height: auto;
        }
        h2 {
            color: #0a2f44;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .sub {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .input-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }
        .input-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #0a2f44;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #ffb347;
            box-shadow: 0 0 0 3px rgba(255,180,71,0.2);
        }
        .btn {
            background: #0a2f44;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #ffb347;
            color: #0a2f44;
        }
        .error-msg {
            color: #d9534f;
            font-size: 0.85rem;
            margin-top: 12px;
            background: #f8d7da;
            padding: 8px;
            border-radius: 50px;
            display: none;
        }
        footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #6c757d;
        }
        @media (max-width: 500px) {
            .login-card {
                padding: 1.5rem;
            }
            .logo {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <img src="img/school-logo.png" alt="Christ's School Logo">
    </div>
    <h2>Welcome Back</h2>
    <div class="sub">Sign in to your portal</div>

    <form id="loginForm">
        <div class="input-group">
            <label><i class="fas fa-user"></i> Username</label>
            <input type="text" id="username" placeholder="Enter your username" required>
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn">Login</button>
        <div id="errorMsg" class="error-msg"></div>
    </form>
    <footer>Christ’s School Ado Ekiti – Christus Victor</footer>
    <a href="index.html">Home</a>
</div>

<script>
    // STATIC USER ARRAY (username, password, image, paid)
    const users = [
        { username: "john_doe", password: "pass123", image: "student1.jpg", paid: true },
        { username: "jane_smith", password: "pass456", image: "student2.jpg", paid: true },
        { username: "debtor_student", password: "debt123", image: "student3.jpg", paid: false },
        { username: "admin", password: "admin123", image: "admin.png", paid: true }
        // Add more students as needed
    ];

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');

        const user = users.find(u => u.username === username && u.password === password);

        if (!user) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Invalid username or password.';
            return;
        }

        // Store user data in localStorage (to be used in dashboard)
        localStorage.setItem('loggedInUser', JSON.stringify({
            username: user.username,
            image: user.image,
            paid: user.paid
        }));

        // Redirect based on payment status
        if (user.paid === true) {
            window.location.href = 'dashboard.html';
        } else {
            window.location.href = 'debtors.html';
        }
    });
</script>
</body>
</html>
